services:
  bot:
    build: .
    restart: unless-stopped
    # aiogram завершує long polling довше за стандартні 10с — без цього
    # docker при редеплої вбиває бота SIGKILL (exit 137, фальшивий «БОТ ВПАВ»)
    stop_grace_period: 30s
    env_file: .env
    volumes:
      - ./data:/app/data
    # json-file без лімітів росте нескінченно — на 45 ГБ диску це питання часу
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
